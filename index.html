<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyMe - Onboarding Wizard</title>
    
    <link  rel="stylesheet" href="CSS/bootstrap.css">
    <link rel="stylesheet" href="CSS/style.css">
    
    <style>
        
    </style>
</head>
<body>

<div class="wizard-container text-center">
    
    <div class="mb-4">
        <h2 class="brand-header d-flex align-items-center justify-content-center gap-2">
            <span style="width: 12px; height: 12px; background-color: #12824c; display: inline-block; border-radius: 3px;"></span>
            VerifyMe
        </h2>
        <p class="sub-header m-0">Open your account — it takes about 3 minutes</p>
    </div>

    <div class="wizard-card text-start">
        
        <div class="step-header">
            <div class="row text-center g-0">
                <div class="col-4">
                    <span class="step-link active">1 • Identity</span>
                </div>
                <div class="col-4">
                    <span class="step-link">2 • Address & Income</span>
                </div>
                <div class="col-4">
                    <span class="step-link">3 • Documents</span>
                </div>
            </div>
            <div class="step-indicator-bar"></div>
        </div>

        <form action="#" method="POST" onsubmit="return false;">
            
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="fullName" placeholder="Full legal name" required>
                <label for="fullName">Full legal name</label>
            </div>

            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="emailAddress" placeholder="Email address" required>
                <label for="emailAddress">Email address</label>
            </div>

            <div class="mb-3">
                <label class="form-label-custom" for="mobileNumber">Mobile number</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-dark fw-medium">+91</span>
                    <input type="tel" class="form-control" id="mobileNumber" placeholder="10-digit mobile" pattern="[0-9]{10}" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label-custom" for="panCard">PAN</label>
                <div class="input-group">
                    <span class="input-group-text bg-light">💳</span>
                    <input type="text" class="form-control text-uppercase" id="panCard" placeholder="ABCDE1234F" pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" required>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center pt-2">
                <button type="button" class="btn btn-outline-back rounded">Back</button>
                <button type="submit" class="btn btn-continue rounded">Continue</button>
            </div>

        </form>
    </div>

    <div class="security-footer mt-4 text-center">
        🔒 Bank-grade encryption • your data is never sold
    </div>

</div>

</body>
</html>
